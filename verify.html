<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verify Email – AutoWeave</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="si-theme">

  <section style="padding:120px 20px; text-align:center;">
    <h1 style="font-weight:900;">Verifying your email…</h1>
    <p id="status" style="opacity:0.7; margin-top:20px;">Please wait.</p>
  </section>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const statusEl = document.getElementById("status");

  if (!token) {
    statusEl.textContent = "Invalid verification link (missing token).";
  } else {
    (async () => {
      try {
        // ✅ Use POST (your backend rejects GET with 405)
        const res = await fetch("https://autoweave-backend.onrender.com/api/v1/auth/verify?token=" + encodeURIComponent(token), {
          method: "POST"
        });

        let data = {};
        try { data = await res.json(); } catch (_) {}

        if (!res.ok) {
          statusEl.textContent = data.detail || data.message || `Verification failed (${res.status}).`;
          return;
        }

        statusEl.textContent = data.message || "Email verified successfully.";

        // optional: redirect after a moment
        // setTimeout(() => window.location.href = "/tech.html#workbench", 1200);

      } catch (e) {
        statusEl.textContent = "Verification failed (network error).";
      }
    })();
  }
</script>

</body>
</html>
